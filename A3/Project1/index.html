<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Squid Game Landing Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main">
        <!-- background text -->
        <h1 class="bg-left">GAME</h1>
        <h1 class="bg-right">SQUID</h1>
        <!-- Navbar -->
        <nav class="navbar">
            <div class="logo">
                <img src="logo1.png" alt="logo">
            </div>
            <div class="nav-links">
                <a href="#">About</a>
                <a href="#" class="active">Watch now</a>
                <a href="#">Actors</a>
                <a href="#">Contact</a>
            </div>
            <div class="menu">
                ☰
            </div>
        </nav>
        <!-- Hero Section -->
        <div class="hero">
            <!-- left -->
            <div class="left">
                <img src="logo1.png" alt="" class="title-logo">
                <p>
                    Action / Thriller / Drama Series directed by
                    Dong-hyuk Hwang <br>
                    Season 1: 9 Episodes
                </p>
                <div class="buttons">
                    <button class="play-btn">▶ Play Now</button>
                    <button class="trailer-btn">▷ Watch Trailer</button>
                </div>

            </div>
            <!-- center small scroll -->
            <div class="scroll">
                <span>SCROLL</span>
                <div class="scroll-line"></div>
            </div>
            <!-- right -->
            <div class="right">
                <img src="guard.png" alt="">
            </div>
        </div>
        <!-- Social Icons -->
        <div class="social">
            <span>𝕏</span>
            <span>🅾</span>
            <span>ⓕ</span>
        </div>
        <!-- bottom cards -->
        <div class="cards">
            <div class="card">
                <img src="tile_1.jpg" alt="">
                <div class="play-icon">▶</div>
            </div>
            <div class="card">
                <img src="tile_2.webp" alt="">
                <div class="play-icon">▶</div>
            </div>
            <div class="card">
                <img src="tile_3.jpg" alt="">
                <div class="play-icon">▶</div>
            </div>
        </div>
    </div>
</body>
</html>
