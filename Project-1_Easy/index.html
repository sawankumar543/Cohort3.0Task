<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Easy Task 1</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="container">
      <div class="box box1">
        <img src="EASYIMG1-removebg-preview.png" alt="image1" />
      </div>
      <div class="box box2">
        <div class="badge-container">
          <div class="rotating-badge">
            <svg viewBox="0 0 200 200" class="text-ring">
              <path
                id="textpath"
                fill="transparent"
                d="M 100, 100 m -80, 0 a 80, 80 0 1,0 160,0 a 80, 80 0 1,0 -160,0"
              ></path>
              <text
                fill="#ffffff"
                font-size="12"
                font-weight="bold"
                letter-spacing="4"
                text-anchor="middle"
                dominant-baseline="middle"
              >
                <textPath href="#textpath">
                  MORE CASES . MORE CASES . MORE CASES . MORE CASES . MORE CASES
                  . MORE CASES. MORE CASES .
                </textPath>
              </text>
            </svg>
            <div class="inner-dotted-ring">
              <span class="center-icon"
                ><img src="flowrimgeasy-removebg-preview.png" alt=""
              /></span>
            </div>
          </div>
        </div>
      </div>
      <div class="box box3">
        <div id="topbottom">
          <div class="top">
            <span><i class="ri-apps-line"></i> CATEGORIES <div></div></span>
            <span><i class="fa-regular fa-credit-card"></i> PAYMENT <div></div></span>
            <span><i class="ri-user-line"></i> AUTHORS <div></div></span>
            <span><i class="ri-auction-line"></i> AUCTION <div></div></span>
            <span><i class="fa-solid fa-arrow-trend-up"></i> SALES <div></div></span>
            <span><i class="fa-regular fa-star"></i> REVIEWS <div></div></span>
          </div>
          <div class="bottom">
            <span><i class="fa-regular fa-envelope"></i> CONTACTS <div></div></span>
          </div>
        </div>
      </div>
      <div class="box box4">
        <div class="left"><i class="fa-regular fa-face-grin"></i>Only exclusive <br>illustrations</div>
        <div class="right">
          <i class="fa-solid fa-people-carry-box"></i> We do not sell <br> works on stock
        </div>
      </div>
      <div class="box box5">
        <img src="EASYIMG2.jpeg" alt="">
      </div>


      <div class="box box6">
        <div class="box6top">
          <h1>BUTUSIC</h1>
          <p>ILLUSTRATIONS <br> EXHIBITION</p>
        </div>
        <div class="box6bottom">
          <span><i class="fa-solid fa-bitcoin-sign"></i> 
            We accept more <br>
than just bitcoins</span>
        </div>
      </div>
      <div class="box box7"></div>
      <div class="box box8"></div>
      <div class="box box9"></div>
      <div class="box box10"></div>
    </div>
    <script
      src="https://kit.fontawesome.com/a18c313de6.js"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
